# Internal reverse proxy for PMIS — replaces the Cloudflare Worker.
# The app is built with basePath=/pmis, so no path rewriting is needed:
# nginx passes /pmis/... straight through and the app answers it.

server {
    listen 80;
    server_name pmis.yourcorp.internal;   # <-- your placeholder work domain

    # Redirect to HTTPS once certs are in place; comment out until then.
    # return 301 https://$host$request_uri;

    location /pmis {
        proxy_pass http://app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

